services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agentcfo
      POSTGRES_USER: agentcfo
      POSTGRES_PASSWORD: agentcfo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentcfo -d agentcfo"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/AgentCfo.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=agentcfo;Username=agentcfo;Password=agentcfo
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
